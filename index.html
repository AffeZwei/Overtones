<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Frequency Player</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Partial Player</h1>

<div class="control">
    <label for="fundamental">Fundamental Frequency (Hz)</label>

    <div class="spinner">

        <button id="fundMinus">−</button>

        <input
            id="fundamental"
            type="number"
            value="100"
            min="0.01"
            step="0.1">

        <button id="fundPlus">+</button>

    </div>
</div>

<div class="control">
    <label for="multiplier">Partials / Overtones</label>

    <div class="spinner">

        <button id="multMinus">−</button>

        <input
            id="multiplier"
            type="number"
            value="3"
            min="1"
            step="1">

        <button id="multPlus">+</button>

    </div>
</div>
    <div class="output">

        Output Frequency

        <span id="outputFrequency">
            300 Hz
        </span>

    </div>

    <div class="control">

        <label for="volume">Volume</label>

        <input
            id="volume"
            type="range"
            min="0"
            max="100"
            value="20">

    </div>

    <div class="buttons">

        <button id="startButton">
            Start
        </button>

        <button id="stopButton">
            Stop
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
